<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Orthodox Library Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      background: #f8f8f8;
    }

    h2 {
      margin-bottom: 10px;
    }

    #chat {
      border: 1px solid #ccc;
      background: white;
      height: 500px;
      overflow-y: auto;
      padding: 12px;
      border-radius: 10px;
    }

    .msg {
      margin: 12px 0;
    }

    .user {
      text-align: right;
    }

    .bot {
      text-align: left;
    }

    .bubble {
      display: inline-block;
      max-width: 75%;
      padding: 10px 12px;
      border-radius: 12px;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .user .bubble {
      background: #0b5fff;
      color: white;
    }

    .bot .bubble {
      background: #ececec;
      color: black;
    }

    .sources {
      font-size: 12px;
      color: #333;
      margin-top: 6px;
    }

    .sources code {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 2px 6px;
      margin-right: 4px;
    }

    .entity-buttons {
      margin-top: 8px;
    }

    .entity-buttons button {
      margin: 4px 6px 0 0;
      padding: 8px 10px;
      border: 1px solid #bbb;
      border-radius: 8px;
      background: white;
      cursor: pointer;
    }

    .entity-buttons button:hover {
      background: #f1f1f1;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button.send {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: white;
      cursor: pointer;
    }

    .search-row {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    .search-row input {
      flex: 1;
    }
  </style>
</head>
<body>

<h2>Orthodox AI</h2>
<div id="chat"></div>

<div class="controls">
  <input id="input" placeholder="Ask something..." />
  <button class="send" onclick="send()">Send</button>
</div>

<div class="search-row">
  <input id="saintSearch" placeholder="Search saint: Mary of Egypt" />
  <button class="send" onclick="searchSaint()">Search Saint</button>
</div>

<script>
let history = [];

function addMessage(role, text, sources = [], entities = []) {
  const chat = document.getElementById("chat");

  const wrapper = document.createElement("div");
  wrapper.className = "msg " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  wrapper.appendChild(bubble);

  if (role === "bot" && sources.length > 0) {
    const s = document.createElement("div");
    s.className = "sources";
    s.innerHTML = "<strong>Sources:</strong> " +
      sources.map(x => `<code>${x.pdf} p.${x.page}</code>`).join(" ");
    wrapper.appendChild(s);
  }

  if (role === "bot" && entities.length > 0) {
    const entityDiv = document.createElement("div");
    entityDiv.className = "entity-buttons";

    entities.forEach((entity, index) => {
      const btn = document.createElement("button");
      btn.textContent = `${index + 1}. ${entity}`;
      btn.onclick = () => {
        const q = `Tell me about ${entity}`;
        addMessage("user", q);
        history.push({ role: "user", content: q });
        ask(q);
      };
      entityDiv.appendChild(btn);
    });

    wrapper.appendChild(entityDiv);
  }

  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

async function ask(question) {
  try {
    const apiBaseUrl = (window.__ORTHODOX_API_URL__ || "").replace(/\/+$/, "");
    if (!apiBaseUrl) {
      output.innerHTML = "<p>Please set <code>window.__ORTHODOX_API_URL__</code> before using this page.</p>";
      return;
    }

    const res = await fetch(`${apiBaseUrl}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, history })
    });

    const data = await res.json();

    addMessage("bot", data.answer || "(no answer)", data.sources || [], data.entities || []);
    history.push({ role: "assistant", content: data.answer || "" });

  } catch (err) {
    addMessage("bot", "Error: " + err.message);
  }
}

function send() {
  const input = document.getElementById("input");
  const question = input.value.trim();
  if (!question) return;

  input.value = "";
  addMessage("user", question);
  history.push({ role: "user", content: question });
  ask(question);
}

function searchSaint() {
  const input = document.getElementById("saintSearch");
  const saint = input.value.trim();
  if (!saint) return;

  const question = `Search saint: ${saint}`;
  input.value = "";

  addMessage("user", question);
  history.push({ role: "user", content: question });
  ask(question);
}
</script>

</body>
</html>
